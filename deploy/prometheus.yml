global:
  scrape_interval: 15s

scrape_configs:
  # 从 OTel Collector 的 Prometheus exporter 采集
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # 直接从应用 /metrics 端点采集
  - job_name: q-workflow
    static_configs:
      - targets: ["host.docker.internal:8080"]
