app:
  name: q-workflow
  description: "A project created by qdev"


server:
  port: 8080

mysql:
  host: "127.0.0.1"
  port: 30306
  user: "appuser"
  password: "apppass123"
  database: "appdb"
  max_open_conns: 100
  max_idle_conns: 10
  max_lifetime: 3600

redis:
  addr: "127.0.0.1:30379"
  password: ""
  db: 0
  pool_size: 10

kafka:
  brokers:
    - "127.0.0.1:30092"
  max_retries: 3

otel:
  enabled: false
  service_name: "q-workflow"
  endpoint: "localhost:4317"
  prometheus:
    enabled: true
    path: "/metrics"

log:
  level: "info"
  format: "console"
  file:
    enabled: true
    path: "logs/app.log"
    max_size: 100
    max_age: 30
    compress: true
